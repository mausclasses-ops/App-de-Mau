<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material del curso — Inglés CENS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  /* ============================================================
     CONFIGURACIÓN — leé la guía "guia_configuracion.md" para
     completar estos 4 valores. No hace falta tocar nada más.
     ============================================================ */
</style>
</head>
<body>

<script>
/* ============================================================
   ZONA DE CONFIGURACIÓN — completá estos 4 valores
   ============================================================ */
const CONFIG = {
  // Link de tu Google Sheet publicado como CSV (ver guía, paso 2)
  SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVqS7ne_qD1d38XMy2_dyJXsLO1i5GdMwrjA_QvfzHrKl7LC_0R866E2FM0z2uUjJGd7CVmWjVrTnz/pub?gid=0&single=true&output=csv",

  // Datos de EmailJS (ver guía, paso 4)
  EMAILJS_PUBLIC_KEY: "xAVGi97XE63mVzCG8",
  EMAILJS_SERVICE_ID: "service_sch59jd",
  EMAILJS_TEMPLATE_ID: "template_jurm6hf",

  // Lo que ven los estudiantes arriba de todo
  TITULO_PORTAL: "Inglés CENS — Material del curso"
};
/* ============================================================
   FIN DE LA ZONA DE CONFIGURACIÓN — no hace falta tocar nada
   debajo de esta línea.
   ============================================================ */
</script>

<style>
:root{
  --paper: #F2EFE6;
  --card: #FBF9F3;
  --ink: #232B3D;
  --ink-soft: #5C6478;
  --ochre: #D9A441;
  --ochre-deep: #B5832A;
  --brick: #B5483D;
  --teal: #2F6B5E;
  --border: #D8D2C2;
  --shadow: 0 4px 14px rgba(35,43,61,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(35,43,61,0.06) 1px, transparent 0);
  background-size: 22px 22px;
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.label{
  font-family:'IBM Plex Mono',monospace;
  letter-spacing:.06em;
  text-transform:uppercase;
  font-size:11px;
  color:var(--ink-soft);
}
h1,h2,h3{font-family:'Fraunces',serif; margin:0;}
button{font-family:'Inter',sans-serif; cursor:pointer;}
a{color:var(--teal);}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.card-stamp{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:4px;
  padding:40px 32px 32px;
  max-width:380px;
  width:100%;
  box-shadow:var(--shadow);
}
.card-stamp::before{
  content:"";
  position:absolute;
  top:0; left:0; right:0;
  height:6px;
  background:repeating-linear-gradient(90deg, var(--ochre) 0 10px, transparent 10px 16px);
  border-radius:4px 4px 0 0;
}
.card-stamp .eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--brick);
  margin-bottom:10px;
}
.card-stamp h1{
  font-size:26px;
  font-weight:600;
  line-height:1.25;
  margin-bottom:6px;
}
.card-stamp p.sub{
  color:var(--ink-soft);
  font-size:14px;
  margin:0 0 26px;
}
.field{margin-bottom:16px;}
.field label{display:block; margin-bottom:6px;}
select, input[type=password], input[type=text], textarea{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:15px;
  padding:11px 12px;
  border:1px solid var(--border);
  border-radius:3px;
  background:#fff;
  color:var(--ink);
}
select:focus, input:focus, textarea:focus{
  outline:2px solid var(--ochre);
  outline-offset:1px;
}
.btn-primary{
  width:100%;
  background:var(--teal);
  color:#fff;
  border:none;
  border-radius:3px;
  padding:13px;
  font-size:15px;
  font-weight:600;
  margin-top:6px;
  transition:background .15s ease;
}
.btn-primary:hover{background:#244f45;}
.btn-primary:focus-visible{outline:2px solid var(--ochre); outline-offset:2px;}
.error-msg{
  color:var(--brick);
  font-size:13px;
  margin-top:10px;
  min-height:16px;
}
.loading-msg{color:var(--ink-soft); font-size:13px; margin-top:10px;}

/* ---------- MAIN ---------- */
#main-screen{display:none; min-height:100vh;}
header.topbar{
  background:var(--ink);
  color:#fff;
  padding:18px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
header.topbar .titlewrap .label{color:#C9CDD9;}
header.topbar h2{font-size:19px; font-weight:600; color:#fff;}
.logout-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.35);
  color:#fff;
  font-size:13px;
  padding:8px 14px;
  border-radius:3px;
}
.logout-btn:hover{background:rgba(255,255,255,0.1);}

.tabs-strip{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:18px 20px 4px;
  scrollbar-width:thin;
}
.tab-folder{
  flex:0 0 auto;
  background:var(--card);
  border:1px solid var(--border);
  border-bottom:none;
  padding:10px 16px 12px;
  border-radius:6px 6px 0 0;
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  letter-spacing:.03em;
  color:var(--ink-soft);
  position:relative;
  top:1px;
}
.tab-folder.active{
  background:#fff;
  color:var(--ink);
  font-weight:600;
  border-color:var(--ochre);
  box-shadow:0 -2px 0 var(--ochre) inset;
}
.tab-folder:hover{color:var(--ink);}

main.content{
  background:#fff;
  border-top:1px solid var(--border);
  min-height:60vh;
  padding:24px 20px 80px;
}
.material-list{
  max-width:760px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.material-item{
  display:flex;
  align-items:center;
  gap:14px;
  border:1px solid var(--border);
  border-radius:5px;
  padding:14px 16px;
  text-decoration:none;
  color:var(--ink);
  background:var(--card);
  transition:border-color .15s ease, transform .1s ease;
}
.material-item:hover{border-color:var(--ochre-deep); transform:translateX(2px);}
.material-icon{
  flex:0 0 auto;
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%;
  background:#fff;
  border:1px solid var(--border);
}
.material-icon svg{width:16px; height:16px;}
.material-info{flex:1; min-width:0;}
.material-name{font-weight:600; font-size:15px;}
.material-type{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-top:2px;
}
.empty-state{
  text-align:center;
  color:var(--ink-soft);
  padding:50px 20px;
  font-size:14px;
}

/* ---------- CONTACT FAB + MODAL ---------- */
.fab-contact{
  position:fixed;
  right:20px;
  bottom:20px;
  background:var(--brick);
  color:#fff;
  border:none;
  border-radius:30px;
  padding:14px 20px;
  font-size:14px;
  font-weight:600;
  box-shadow:0 6px 18px rgba(181,72,61,0.35);
  display:flex;
  align-items:center;
  gap:8px;
  z-index:50;
}
.fab-contact:hover{background:#9c3c32;}
.modal-overlay{
  display:none;
  position:fixed; inset:0;
  background:rgba(35,43,61,0.55);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#fff;
  border-radius:6px;
  max-width:420px;
  width:100%;
  padding:28px;
  position:relative;
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
}
.modal-box h3{font-size:20px; margin-bottom:4px;}
.modal-box p.sub{color:var(--ink-soft); font-size:13px; margin:0 0 20px;}
.modal-close{
  position:absolute; top:14px; right:14px;
  background:none; border:none;
  font-size:20px; color:var(--ink-soft); line-height:1;
  padding:4px;
}
textarea{resize:vertical; min-height:90px;}
.contact-status{font-size:13px; margin-top:10px;}
.contact-status.ok{color:var(--teal);}
.contact-status.err{color:var(--brick);}

@media (max-width:480px){
  .card-stamp{padding:32px 22px 26px;}
  header.topbar h2{font-size:17px;}
}
</style>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="card-stamp">
    <div class="eyebrow">Acceso al curso</div>
    <h1 id="portal-title">Material del curso</h1>
    <p class="sub">Elegí tu curso e ingresá la contraseña que te dio el profesor.</p>

    <div class="field">
      <label for="curso-select">Curso</label>
      <select id="curso-select"><option value="">Cargando cursos…</option></select>
    </div>
    <div class="field">
      <label for="pass-input">Contraseña</label>
      <input type="password" id="pass-input" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="login-btn">Ingresar</button>
    <div class="error-msg" id="login-error"></div>
    <div class="loading-msg" id="login-loading">Cargando material…</div>
  </div>
</div>

<!-- ============ MAIN ============ -->
<div id="main-screen">
  <header class="topbar">
    <div class="titlewrap">
      <div class="label">Curso</div>
      <h2 id="curso-actual">—</h2>
    </div>
    <button class="logout-btn" id="logout-btn">Salir</button>
  </header>

  <nav class="tabs-strip" id="tabs-strip"></nav>

  <main class="content">
    <div class="material-list" id="material-list"></div>
  </main>

  <button class="fab-contact" id="open-contact-btn">✉ Contactá al profesor</button>
</div>

<!-- ============ CONTACT MODAL ============ -->
<div class="modal-overlay" id="contact-overlay">
  <div class="modal-box">
    <button class="modal-close" id="close-contact-btn">&times;</button>
    <h3>Escribile al profesor</h3>
    <p class="sub">Tu mensaje llega directo por mail. No necesitás WhatsApp.</p>
    <div class="field">
      <label for="contact-name">Tu nombre</label>
      <input type="text" id="contact-name" placeholder="Nombre y apellido">
    </div>
    <div class="field">
      <label for="contact-email">Tu email (para que te pueda responder)</label>
      <input type="text" id="contact-email" placeholder="tunombre@gmail.com">
    </div>
    <div class="field">
      <label for="contact-msg">Mensaje</label>
      <textarea id="contact-msg" placeholder="Escribí tu consulta acá..."></textarea>
    </div>
    <button class="btn-primary" id="send-contact-btn">Enviar mensaje</button>
    <div class="contact-status" id="contact-status"></div>
  </div>
</div>

<script>
/* ---------- Iconos por tipo de material ---------- */
const ICONS = {
  pdf: '<svg viewBox="0 0 24 24" fill="none" stroke="#B5483D" stroke-width="2"><path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6" stroke="#B5483D"/></svg>',
  imagen: '<svg viewBox="0 0 24 24" fill="none" stroke="#2F6B5E" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
  video: '<svg viewBox="0 0 24 24" fill="none" stroke="#B5832A" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="#B5832A" stroke="none"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="#5C6478" stroke-width="2"><path d="M9 17H7a5 5 0 010-10h2"/><path d="M15 7h2a5 5 0 010 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>'
};
function iconFor(tipo){
  const t = (tipo||'').toLowerCase().trim();
  if(t.includes('pdf')) return ICONS.pdf;
  if(t.includes('imagen') || t.includes('foto')) return ICONS.imagen;
  if(t.includes('video') || t.includes('youtube')) return ICONS.video;
  return ICONS.link;
}

let ALL_ROWS = [];
let CURRENT_CURSO = null;
let CURRENT_ROWS = [];
let CURRENT_FOLDER = null;

document.getElementById('portal-title').textContent = CONFIG.TITULO_PORTAL;

/* ---------- Cargar la planilla (CSV) ---------- */
function cargarPlanilla(){
  Papa.parse(CONFIG.SHEET_CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results){
      ALL_ROWS = results.data.map(r => ({
        curso: (r['Curso']||'').trim(),
        carpeta: (r['CarpetaTema']||'Sin carpeta').trim(),
        nombre: (r['NombreMaterial']||'Material').trim(),
        tipo: (r['Tipo']||'Link').trim(),
        url: (r['URL']||'').trim(),
        password: (r['Password']||'').trim()
      })).filter(r => r.curso && r.url);

      const cursos = [...new Set(ALL_ROWS.map(r=>r.curso))].sort();
      const sel = document.getElementById('curso-select');
      sel.innerHTML = '<option value="">Elegí tu curso…</option>' +
        cursos.map(c=>`<option value="${c.replace(/"/g,'&quot;')}">${c}</option>`).join('');
      document.getElementById('login-loading').style.display='none';
    },
    error: function(){
      document.getElementById('login-loading').style.display='none';
      document.getElementById('login-error').textContent =
        'No se pudo cargar el material. Avisale al profesor.';
    }
  });
}
cargarPlanilla();

/* ---------- Login ---------- */
document.getElementById('login-btn').addEventListener('click', intentarLogin);
document.getElementById('pass-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') intentarLogin();
});

function intentarLogin(){
  const curso = document.getElementById('curso-select').value;
  const pass = document.getElementById('pass-input').value.trim();
  const errBox = document.getElementById('login-error');
  errBox.textContent = '';

  if(!curso){ errBox.textContent='Elegí un curso.'; return; }
  if(!pass){ errBox.textContent='Ingresá la contraseña.'; return; }

  const rowsCurso = ALL_ROWS.filter(r=>r.curso===curso);
  const passOk = rowsCurso.some(r => r.password.toLowerCase() === pass.toLowerCase());

  if(!passOk){
    errBox.textContent = 'Contraseña incorrecta para ese curso.';
    return;
  }

  CURRENT_CURSO = curso;
  CURRENT_ROWS = rowsCurso;
  sessionStorage.setItem('cens_curso', curso);
  sessionStorage.setItem('cens_pass', pass);
  mostrarMain();
}

function mostrarMain(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('curso-actual').textContent = CURRENT_CURSO;

  const carpetas = [...new Set(CURRENT_ROWS.map(r=>r.carpeta))];
  CURRENT_FOLDER = carpetas[0] || null;
  renderTabs(carpetas);
  renderMateriales();
}

function renderTabs(carpetas){
  const strip = document.getElementById('tabs-strip');
  strip.innerHTML = carpetas.map(c =>
    `<button class="tab-folder ${c===CURRENT_FOLDER?'active':''}" data-folder="${c.replace(/"/g,'&quot;')}">${c}</button>`
  ).join('');
  strip.querySelectorAll('.tab-folder').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      CURRENT_FOLDER = btn.dataset.folder;
      strip.querySelectorAll('.tab-folder').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderMateriales();
    });
  });
}

function renderMateriales(){
  const list = document.getElementById('material-list');
  const items = CURRENT_ROWS.filter(r=>r.carpeta===CURRENT_FOLDER);
  if(items.length===0){
    list.innerHTML = '<div class="empty-state">Todavía no hay material acá.</div>';
    return;
  }
  list.innerHTML = items.map(it=>`
    <a class="material-item" href="${it.url}" target="_blank" rel="noopener">
      <span class="material-icon">${iconFor(it.tipo)}</span>
      <span class="material-info">
        <div class="material-name">${it.nombre}</div>
        <div class="material-type">${it.tipo}</div>
      </span>
    </a>
  `).join('');
}

/* ---------- Logout ---------- */
document.getElementById('logout-btn').addEventListener('click', ()=>{
  sessionStorage.removeItem('cens_curso');
  sessionStorage.removeItem('cens_pass');
  CURRENT_CURSO = null; CURRENT_ROWS = [];
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pass-input').value='';
});

/* ---------- Recordar sesión dentro de la pestaña ---------- */
window.addEventListener('load', ()=>{
  const savedCurso = sessionStorage.getItem('cens_curso');
  const savedPass = sessionStorage.getItem('cens_pass');
  if(savedCurso && savedPass){
    const tryRestore = setInterval(()=>{
      if(ALL_ROWS.length>0){
        clearInterval(tryRestore);
        const rowsCurso = ALL_ROWS.filter(r=>r.curso===savedCurso);
        const ok = rowsCurso.some(r=>r.password.toLowerCase()===savedPass.toLowerCase());
        if(ok){
          CURRENT_CURSO = savedCurso;
          CURRENT_ROWS = rowsCurso;
          document.getElementById('curso-select').value = savedCurso;
          mostrarMain();
        }
      }
    },150);
  }
});

/* ---------- Contacto (EmailJS) ---------- */
if(CONFIG.EMAILJS_PUBLIC_KEY && !CONFIG.EMAILJS_PUBLIC_KEY.startsWith('PEGAR_')){
  emailjs.init({publicKey: CONFIG.EMAILJS_PUBLIC_KEY});
}
const overlay = document.getElementById('contact-overlay');
document.getElementById('open-contact-btn').addEventListener('click', ()=>{
  overlay.classList.add('open');
  document.getElementById('contact-status').textContent='';
});
document.getElementById('close-contact-btn').addEventListener('click', ()=> overlay.classList.remove('open'));
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.classList.remove('open'); });

document.getElementById('send-contact-btn').addEventListener('click', ()=>{
  const nombre = document.getElementById('contact-name').value.trim();
  const emailEstudiante = document.getElementById('contact-email').value.trim();
  const mensaje = document.getElementById('contact-msg').value.trim();
  const status = document.getElementById('contact-status');

  if(!mensaje){ status.className='contact-status err'; status.textContent='Escribí un mensaje.'; return; }

  status.className='contact-status'; status.textContent='Enviando…';

  emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, {
    from_name: nombre || 'Estudiante sin nombre',
    curso: CURRENT_CURSO || 'No identificado',
    message: mensaje,
    reply_to: emailEstudiante || 'sin-email@no-respondido.com'
  }).then(()=>{
    status.className='contact-status ok';
    status.textContent='¡Mensaje enviado! El profesor te va a responder por mail.';
    document.getElementById('contact-msg').value='';
    document.getElementById('contact-email').value='';
    document.getElementById('contact-name').value='';
  }).catch(()=>{
    status.className='contact-status err';
    status.textContent='No se pudo enviar. Probá de nuevo en un momento.';
  });
});
</script>
</body>
</html>
